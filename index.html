<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Quest: Empathy (Random Backgrounds)</title>
  <style>
    body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
    canvas { display: block; image-rendering: pixelated; }

    #ui-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: white; pointer-events: none;
    }

    #title-bg {
      position: absolute;
      inset: 0;
      background: #000;
      display: none;
      pointer-events: none;
      z-index: 0;
    }
    #title-bg img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
      display: block;
    }

    #title-screen {
      position: relative;
      left: -260px;
      transform: translateY(40px);
      width: min(280px, 60vw);
      padding: 38px 28px;
      z-index: 2;
    }

    #leaderboard-screen, #end-screen, #dialogue-box, #enemy-chat { position: relative; z-index: 2; }

    .menu-box {
      background: rgba(0, 0, 0, 0.95); border: 4px solid #fff;
      padding: 30px; text-align: center; pointer-events: auto;
    }

    #title-screen p { font-size: 16px; margin: 18px 0; }
    #title-screen button { display: block; width: 100%; margin: 12px 0; }

    button {
      background: #ff4081; border: 3px solid #fff; padding: 12px 24px;
      font-size: 20px; cursor: pointer; font-family: inherit; color: white; font-weight: bold; margin: 10px;
    }
    button:hover { background: #fff; color: #000; }
    button:disabled { background: #555; border-color: #999; cursor: not-allowed; }

    #dialogue-box {
      position: absolute; bottom: 80px; background: #fff; color: #000;
      padding: 20px; width: 70%; border: 6px solid #555;
      display: none; pointer-events: auto; cursor: pointer; z-index: 100;
    }

    #enemy-chat {
      position: absolute;
      bottom: 170px;
      background: rgba(255, 255, 255, 0.95);
      color: #000;
      padding: 14px 18px;
      width: min(520px, 86vw);
      border: 5px solid #555;
      display: none;
      pointer-events: none;
      z-index: 99;
    }
    #enemy-chat strong { display: block; margin-bottom: 6px; }
    #enemy-chat p { margin: 0; }

    .hidden { display: none !important; }
    input { padding: 10px; font-size: 18px; width: 200px; margin-bottom: 10px; border: 2px solid #000; }

    /* =========================
       RESPONSIVE UI (3 sizes)
       Desktop: default styles above
       Tablet (landscape): <= 1024px
       Mobile (landscape): <= 740px
       ========================= */

    html, body {
      width: 100%;
      height: 100%;
    }
    #gameCanvas {
      width: 100vw;
      height: 100vh;
    }

    .menu-box {
      max-width: min(520px, 92vw);
      box-sizing: border-box;
    }

    #title-screen { box-sizing: border-box; }

    #dialogue-box {
      max-width: 92vw;
      left: 50%;
      transform: translateX(-50%);
      box-sizing: border-box;
    }

    #enemy-chat {
      left: 50%;
      transform: translateX(-50%);
      box-sizing: border-box;
    }

    button, input {
      max-width: 100%;
      box-sizing: border-box;
    }

    @media (max-width: 1024px) and (orientation: landscape) {
      #title-screen {
        left: 0;
        transform: translateY(20px);
        width: min(420px, 88vw);
        padding: 24px 18px;
      }

      #title-screen p { font-size: 14px; margin: 12px 0; }

      button {
        font-size: 18px;
        padding: 10px 16px;
        margin: 8px;
      }

      #dialogue-box {
        bottom: 60px;
        width: min(760px, 92vw);
        padding: 14px;
        border-width: 5px;
      }

      #enemy-chat {
        bottom: 150px;
        width: min(640px, 92vw);
        padding: 12px 14px;
        border-width: 4px;
      }
    }

    @media (max-width: 740px) and (orientation: landscape) {
      #title-screen {
        position: relative;
        left: 0;
        transform: translateY(40px);
        width: min(280px, 60vw);
        padding: 38px 28px;
        z-index: 2;
      }

      #title-screen p { font-size: 12px; margin: 10px 0; }

      button {
        font-size: 16px;
        padding: 8px 12px;
        margin: 6px;
        border-width: 2px;
      }

      #leaderboard-screen h2 { font-size: 18px; }

      #dialogue-box {
        bottom: 44px;
        width: 94vw;
        padding: 10px 10px;
        border-width: 4px;
      }
      #dialogue-box strong { font-size: 14px; }
      #dialogue-box p { font-size: 13px; margin: 6px 0; }
      #dialogue-box small { font-size: 11px; }

      #enemy-chat {
        bottom: 120px;
        width: 94vw;
        padding: 10px 10px;
        border-width: 4px;
      }
      #enemy-chat strong { font-size: 13px; }
      #enemy-chat p { font-size: 12px; }

      input {
        font-size: 14px;
        padding: 8px;
        width: min(220px, 70vw);
      }
    }
  </style>
</head>
<body>
  <div id="ui-layer">
    <div id="title-bg">
      <img src="bg-title.png" alt="title background" />
    </div>

    <div id="title-screen" class="menu-box">
      <p>ARROWS: Move | J: Jump | S: Shoot (Needs Orbs)</p>
      <button onclick="startGame()" id="start-button" disabled>LOADING ASSETS...</button>
      <button onclick="showLeaderboard()">LEADERBOARD</button>
    </div>

    <div id="leaderboard-screen" class="menu-box hidden">
      <h2>HALL OF HEROES</h2>
      <div id="leaderboard-list" style="text-align: left; margin-bottom: 20px;"></div>
      <button onclick="showTitle()">BACK</button>
    </div>

    <div id="dialogue-box">
      <strong id="dialogue-name">???</strong>
      <p id="dialogue-text"></p>
      <small style="color: #666">(Press SPACE to continue)</small>
    </div>

    <div id="enemy-chat">
      <strong id="enemy-chat-name">ENEMY</strong>
      <p id="enemy-chat-text"></p>
    </div>

    <div id="end-screen" class="menu-box hidden">
      <h1>JOURNEY COMPLETE</h1>
      <p id="end-stats"></p>
      <input type="text" id="player-name" placeholder="YOUR NAME" maxlength="10"><br>
      <button onclick="saveScore()">SAVE SCORE</button>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script>
    /** 1. ASSETS & SETUP **/
    let assetsToLoad = 15; // 8 images + 4 music + 3 sfx
    let assetsLoaded = 0;

    function assetLoaded() {
      assetsLoaded++;
      if (assetsLoaded >= assetsToLoad) {
        const startButton = document.getElementById('start-button');
        startButton.disabled = false;
        startButton.innerText = 'START JOURNEY';
      }
    }

    /* --- IMAGES --- */
    const playerImg = new Image(); playerImg.onload = assetLoaded; playerImg.src = "mc.png";
    const birdImg = new Image(); birdImg.onload = assetLoaded; birdImg.src = "handpixel.png";
    const houseImg = new Image(); houseImg.onload = assetLoaded; houseImg.src = "village.png";
    const buildingImg = new Image(); buildingImg.onload = assetLoaded; buildingImg.src = "building.png";
    const titleBgImg = new Image(); titleBgImg.onload = assetLoaded; titleBgImg.src = "bg-title.png";
    const manEnemyImg = new Image(); manEnemyImg.onload = assetLoaded; manEnemyImg.src = "man1.png";

    // Boss images for level 2 & 3
    const bossLvl2Img = new Image(); bossLvl2Img.onload = assetLoaded; bossLvl2Img.src = "boss.png";
    const bossLvl3Img = new Image(); bossLvl3Img.onload = assetLoaded; bossLvl3Img.src = "neighbour.png";

    /* =========================
       SOUND / MUSIC
       ========================= */
    let audioUnlocked = false;

    function unlockAudioOnce() {
      if (audioUnlocked) return;
      audioUnlocked = true;
      if (gameState === 'TITLE') playIntroMusic();
    }
    window.addEventListener("pointerdown", unlockAudioOnce, { once: true });
    window.addEventListener("keydown", unlockAudioOnce, { once: true });

    function safePlay(audioEl, { restart = false } = {}) {
      if (!audioUnlocked) return;
      if (restart) audioEl.currentTime = 0;
      audioEl.play().catch(() => {});
    }
    function safePause(audioEl) { audioEl.pause(); }
    function safeStop(audioEl) { audioEl.pause(); audioEl.currentTime = 0; }

    /* --- MUSIC --- */
    const introMusic = new Audio("./music/intro.mp3");
    introMusic.preload = "auto";
    introMusic.loop = true;
    introMusic.volume = 0.9;
    introMusic.addEventListener("canplaythrough", assetLoaded, { once: true });

    const dayMusic = new Audio("./music/day.mp3");
    dayMusic.preload = "auto";
    dayMusic.loop = true;
    dayMusic.volume = 0.8;
    dayMusic.addEventListener("canplaythrough", assetLoaded, { once: true });

    const nightMusic = new Audio("./music/night.mp3");
    nightMusic.preload = "auto";
    nightMusic.loop = true;
    nightMusic.volume = 0.8;
    nightMusic.addEventListener("canplaythrough", assetLoaded, { once: true });

    const bossMusic = new Audio("./music/boss.mp3");
    bossMusic.preload = "auto";
    bossMusic.loop = false;
    bossMusic.volume = 1.0;
    bossMusic.addEventListener("canplaythrough", assetLoaded, { once: true });

    /* --- SFX --- */
    const runSfx = new Audio("./sfx/run.mp3");
    runSfx.preload = "auto";
    runSfx.loop = true;
    runSfx.volume = 0.6;
    runSfx.addEventListener("canplaythrough", assetLoaded, { once: true });

    const upgradeSfx = new Audio("./sfx/upgrade.mp3");
    upgradeSfx.preload = "auto";
    upgradeSfx.loop = false;
    upgradeSfx.volume = 0.9;
    upgradeSfx.addEventListener("canplaythrough", assetLoaded, { once: true });

    const dieSfx = new Audio("./sfx/die.mp3");
    dieSfx.preload = "auto";
    dieSfx.loop = false;
    dieSfx.volume = 0.9;
    dieSfx.addEventListener("canplaythrough", assetLoaded, { once: true });

    function stopAllMusic() {
      [introMusic, dayMusic, nightMusic, bossMusic].forEach(safeStop);
    }
    function stopLevelMusic() { safeStop(dayMusic); safeStop(nightMusic); }

    function playIntroMusic() {
      if (!audioUnlocked) return;
      stopLevelMusic();
      safeStop(bossMusic);
      if (introMusic.paused) safePlay(introMusic, { restart: true });
    }

    function playLevelMusic(lvl) {
      if (!audioUnlocked) return;
      safeStop(introMusic);
      if (lvl === 2) {
        safeStop(dayMusic);
        if (nightMusic.paused) safePlay(nightMusic, { restart: true });
      } else {
        safeStop(nightMusic);
        if (dayMusic.paused) safePlay(dayMusic, { restart: true });
      }
    }

    let isBossMusicPlaying = false;
    function startBossMusic(lvl) {
      if (!audioUnlocked) return;
      stopLevelMusic();
      isBossMusicPlaying = true;
      safePlay(bossMusic, { restart: true });
      bossMusic.onended = () => {
        isBossMusicPlaying = false;
        if (gameState === 'PLAYING') playLevelMusic(lvl);
      };
    }
    function stopBossMusicImmediately() {
      bossMusic.onended = null;
      safeStop(bossMusic);
      isBossMusicPlaying = false;
    }

    /* --- RUN SFX CONTROL --- */
    function updateRunSfx() {
      if (!audioUnlocked) return;
      const isMoving = (gameState === 'PLAYING' && player && Math.abs(player.vx) > 0.1 && !isDialogueActive);
      if (isMoving) {
        if (runSfx.paused) safePlay(runSfx, { restart: false });
      } else {
        if (!runSfx.paused) safePause(runSfx);
      }
    }
    function playUpgradeSfx() { if (audioUnlocked) safePlay(upgradeSfx, { restart: true }); }
    function stopUpgradeSfx() { safeStop(upgradeSfx); }
    function playDieSfx() { if (audioUnlocked) safePlay(dieSfx, { restart: true }); }

    /* --- CANVAS SETUP --- */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const TILE_SIZE = 40;
    const GRAVITY = 0.6;
    const JUMP_FORCE = -14;
    const SPEED = 6;

    const NUM_BG_OBJECTS = 10;
    const BASE_BG_WIDTH = 1100;
    const BASE_BG_HEIGHT = 300;
    const MIN_BG_SCALE = 0.8;
    const MAX_BG_SCALE = 2.5;
    const MIN_BG_SPACING = 400;

    const VILLAGE_BG_SCALE_MULTIPLIER = 1.0;
    const BUILDING_BG_SCALE_MULTIPLIER = 0.75;

    const topTileCanvas = document.createElement('canvas');
    const fillTileCanvas = document.createElement('canvas');

    function createTilePatterns() {
      topTileCanvas.width = topTileCanvas.height = TILE_SIZE;
      const topCtx = topTileCanvas.getContext('2d');
      topCtx.fillStyle = '#A0522D';
      topCtx.fillRect(0, 0, TILE_SIZE, TILE_SIZE);
      topCtx.fillStyle = '#C68642';
      topCtx.fillRect(0, 0, TILE_SIZE, 4);
      topCtx.fillRect(0, 0, 4, TILE_SIZE);
      topCtx.fillStyle = '#5C2F0E';
      topCtx.fillRect(5, 5, 4, 4);
      topCtx.fillRect(TILE_SIZE - 15, TILE_SIZE - 10, 4, 4);

      fillTileCanvas.width = fillTileCanvas.height = TILE_SIZE;
      const fillCtx = fillTileCanvas.getContext('2d');
      fillCtx.fillStyle = '#5C2F0E';
      fillCtx.fillRect(0, 0, TILE_SIZE, TILE_SIZE);
      fillCtx.fillStyle = '#6B4226';
      fillCtx.fillRect(10, 20, 5, 5);
      fillCtx.fillRect(TILE_SIZE - 10, 5, 5, 5);
    }

    /* =========================
       DIALOGUE DATA
       ========================= */
    const BOSS_DIALOGUE = {
      1: { name: "Social Judgement", lines: ["Why are you study so much? Being smart can't get you a husband.", "Man don't like smart women."] },
      2: { name: "A Boss", lines: ["You so hard-working. Too bad, you're a female.", "Let me help you, just stay still and it will be over soon."] },
      3: { name: "Your Neighbour", lines: ["You should marry and have children. Look at your parent, don't you see they are getting old?", "It would be best if you have two. You have a body for that."] }
    };

    const TRAFFIC_LIGHT_DIALOGUE = {
      red: { name: "TRAFFIC LIGHT", lines: ["What are you wearing in bright day light? Too curvaceous and desperate", "Such young age and you already look like that?"] }
    };

    let gameState = 'TITLE';
    let currentLevel = 1;
    let score = 0;
    let ammo = 0;
    let startTime = 0;
    let keys = {};
    let player, levelTiles, enemies, bullets, boss, flower, ammoItems, floatingTexts, cameraX = 0, backgroundObjects, trafficLights;
    let isDialogueActive = false;

    let dialogueQueue = [];
    let dialogueIndex = 0;
    let activeDialogueKind = null; // 'BOSS' | 'TRAFFIC' | null

    let bossMusicPlayedForLevel = { 1: false, 2: false, 3: false };
    let activeTrafficLight = null;

    /* =========================
       RESPONSIVE CANVAS (DPR)
       ========================= */
    function resize() {
      const cssW = window.innerWidth;
      const cssH = window.innerHeight;
      const dpr = Math.max(1, window.devicePixelRatio || 1);

      canvas.style.width = cssW + "px";
      canvas.style.height = cssH + "px";

      canvas.width = Math.floor(cssW * dpr);
      canvas.height = Math.floor(cssH * dpr);

      // IMPORTANT: after setTransform(dpr,...), all drawing coords are in CSS px
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener('resize', () => {
      resize();
      if (gameState === 'PLAYING') initLevel(currentLevel);
    });

    resize();
    createTilePatterns();

    function updateTitleBackgroundVisibility() {
      const titleBg = document.getElementById('title-bg');
      if (!titleBg) return;
      titleBg.style.display = (gameState === 'TITLE') ? 'block' : 'none';
      if (gameState === 'TITLE' && audioUnlocked) playIntroMusic();
    }
    updateTitleBackgroundVisibility();

    /* =========================
       OPTIONAL 3:
       CAP max background scale
       ========================= */
    function getViewportProfile() {
      const w = window.innerWidth;
      if (w <= 740) return 'mobile';
      if (w <= 1024) return 'tablet';
      return 'desktop';
    }

    /* =========================
       FIX: missing helper used
       by Boss.update()
       ========================= */
    function getGroundTopY() {
      return (Math.floor(window.innerHeight / TILE_SIZE) - 3) * TILE_SIZE;
    }

    /* =========================
       DIALOGUE HELPERS
       ========================= */
    function openDialogue({ name, lines }, kind) {
      isDialogueActive = true;
      activeDialogueKind = kind || null;

      dialogueQueue = Array.isArray(lines) ? lines.slice() : [];
      dialogueIndex = 0;

      const box = document.getElementById('dialogue-box');
      box.style.display = 'block';
      document.getElementById('dialogue-name').innerText = name || "???";
      document.getElementById('dialogue-text').innerText = dialogueQueue[0] || "";
    }

    function advanceDialogue() {
      if (!isDialogueActive) return;
      dialogueIndex++;
      if (dialogueIndex >= dialogueQueue.length) {
        closeDialogue();
        return;
      }
      document.getElementById('dialogue-text').innerText = dialogueQueue[dialogueIndex];
    }

    function closeDialogue() {
      isDialogueActive = false;
      document.getElementById('dialogue-box').style.display = 'none';

      if (activeDialogueKind === 'BOSS') {
        if (!boss.active && !boss.defeated && player.x > boss.x - 500) boss.active = true;
      }
      activeDialogueKind = null;
      window.focus();
    }

    /** 2. INPUT **/
    window.addEventListener('keydown', e => {
      if (isDialogueActive) {
        if (e.code === 'Space') { e.preventDefault(); advanceDialogue(); }
        return;
      }

      keys[e.code] = true;

      if (e.code === 'KeyS' && gameState === 'PLAYING' && ammo > 0) {
        bullets.push({ x: player.x + player.w, y: player.y + 25 });
        ammo--;
      }
    });

    window.addEventListener('keyup', e => keys[e.code] = false);

    /** 3. PLAYER **/
    class Player {
      constructor() {
        this.w = 58;
        this.h = 70;
        this.reset();
      }
      reset() { this.x = 80; this.y = 100; this.vx = 0; this.vy = 0; this.grounded = false; }

      update() {
        const trafficBlocking = (activeTrafficLight && activeTrafficLight.state === 'red');

        if (!trafficBlocking) {
          if (keys['ArrowLeft']) this.vx = -SPEED;
          else if (keys['ArrowRight']) this.vx = SPEED;
          else this.vx = 0;
        } else {
          this.vx = 0;
        }

        if (keys['KeyJ'] && this.grounded) { this.vy = JUMP_FORCE; this.grounded = false; }

        this.vy += GRAVITY;

        this.x += this.vx;
        this.solveCollisions(this.vx, 0);

        this.y += this.vy;
        this.solveCollisions(0, this.vy);

        if (this.y > window.innerHeight + 100) {
          playDieSfx();
          this.reset();
          score = Math.max(0, score - 50);
        }
      }

      solveCollisions(vx, vy) {
        this.grounded = false;
        for (let t of levelTiles) {
          if (this.x < t.x + TILE_SIZE && this.x + this.w > t.x && this.y < t.y + TILE_SIZE && this.y + this.h > t.y) {
            if (vy > 0) { this.y = t.y - this.h; this.vy = 0; this.grounded = true; }
            else if (vy < 0) { this.y = t.y + TILE_SIZE; this.vy = 0; }

            if (vx > 0) this.x = t.x - this.w;
            else if (vx < 0) this.x = t.x + TILE_SIZE;
          }
        }
      }
      draw() { ctx.drawImage(playerImg, this.x - cameraX, this.y, this.w, this.h); }
    }

    /** 4. ENEMY **/
    class Enemy {
      constructor(id, x, y) {
        this.id = id;
        this.x = x; this.y = y;
        this.w = 35;
        this.h = 85;

        this.speed = 0.8;
        this.dir = -1;

        this.chaseVx = 0;
        this.chaseAccel = 0.10;
        this.maxChaseSpeed = 5.0;

        this.vx = 0; this.vy = 0;
        this.grounded = false;
        this.dead = false;

        this.chatMsg = this.pickChat();
      }

      pickChat() {
        const msgs = [
          "Stay back... I don't trust strangers.",
          "This land isn't safe at night.",
          "You can't outrun your choices.",
          "Turn around while you still can."
        ];
        return msgs[Math.floor(Math.random() * msgs.length)];
      }

      update() {
        if (currentLevel === 2 && player) {
          const targetDir = (player.x > this.x) ? 1 : -1;
          this.chaseVx += this.chaseAccel * targetDir;

          if (this.chaseVx > this.maxChaseSpeed) this.chaseVx = this.maxChaseSpeed;
          if (this.chaseVx < -this.maxChaseSpeed) this.chaseVx = -this.maxChaseSpeed;

          this.vx = this.chaseVx;
        } else {
          if (Math.random() > 0.99) this.dir *= -1;
          this.vx = this.speed * this.dir;
          this.chaseVx *= 0.92;
        }

        this.vy += GRAVITY;

        this.x += this.vx;
        this.solveCollisions(this.vx, 0);

        this.y += this.vy;
        this.solveCollisions(0, this.vy);

        if (this.y > window.innerHeight + 300) this.dead = true;
      }

      solveCollisions(vx, vy) {
        this.grounded = false;
        for (let t of levelTiles) {
          if (this.x < t.x + TILE_SIZE && this.x + this.w > t.x && this.y < t.y + TILE_SIZE && this.y + this.h > t.y) {
            if (vy > 0) { this.y = t.y - this.h; this.vy = 0; this.grounded = true; }
            else if (vy < 0) { this.y = t.y + TILE_SIZE; this.vy = 0; }

            if (vx > 0) { this.x = t.x - this.w; this.dir *= -1; this.chaseVx = 0; }
            else if (vx < 0) { this.x = t.x + TILE_SIZE; this.dir *= -1; this.chaseVx = 0; }
          }
        }
      }

      draw() { ctx.drawImage(manEnemyImg, this.x - cameraX, this.y, this.w, this.h); }
    }

    class FloatingText {
      constructor(x, y) { this.x = x; this.y = y; this.life = 100; }
      draw() {
        this.y -= 0.5;
        this.life--;
        ctx.fillStyle = `rgba(255, 255, 255, ${this.life/100})`;
        ctx.font = "bold 16px Courier";
        ctx.fillText("+ empathy", this.x - cameraX, this.y);
      }
    }

    function showEnemyChat(enemy) {
      const chat = document.getElementById('enemy-chat');
      document.getElementById('enemy-chat-name').innerText = "ENEMY";
      document.getElementById('enemy-chat-text').innerText = enemy.chatMsg;
      chat.style.display = 'block';
    }
    function hideEnemyChat() { document.getElementById('enemy-chat').style.display = 'none'; }

    /** 5. LEVEL GENERATOR **/
    function generateLevel(lvl) {
      const tiles = [];
      const enemiesArr = [];
      const ammoArr = [];
      let h = Math.floor(window.innerHeight / TILE_SIZE) - 3;

      const ISLAND_MIN_GAP_TILES = 2;
      const ISLAND_MAX_GAP_TILES = 4;
      const ISLAND_LENGTH_TILES = 4;

      let enemyId = 1;

      for (let i = 0; i < 200; i++) {
        if (i > 15 && i < 160 && Math.random() > 0.85) h += (Math.random() > 0.5 ? 1 : -1);
        if (h > 15) h = 15;
        if (h < 9) h = 9;

        let isPit = (lvl > 1 && i % (20 - lvl*2) === 0 && i > 25 && i < 150);

        if (!isPit) {
          for (let j = h; j < window.innerHeight / TILE_SIZE; j++) {
            tiles.push({ x: i * TILE_SIZE, y: j * TILE_SIZE, type: j === h ? 'top' : 'fill' });
          }

          if (i > 20 && i < 150 && Math.random() > 0.98) {
            enemiesArr.push(new Enemy(enemyId++, i * TILE_SIZE, (h - 1) * TILE_SIZE + 5));
          }
          if (i > 15 && i < 150 && Math.random() > 0.98) {
            ammoArr.push({ x: i * TILE_SIZE + 10, y: (h - 1) * TILE_SIZE + 10, collected: false });
          }
        }

        if (!isPit && i > 20 && i % 18 === 0 && i < 150) {
          const gap = Math.floor(Math.random() * (ISLAND_MAX_GAP_TILES - ISLAND_MIN_GAP_TILES + 1)) + ISLAND_MIN_GAP_TILES;
          let islandY = h - gap;
          if (islandY < 2) islandY = 2;

          for (let k = 0; k < ISLAND_LENGTH_TILES; k++) {
            tiles.push({ x: (i + k) * TILE_SIZE, y: islandY * TILE_SIZE, type: 'top' });
            if (k === 2) {
              const ammoY = islandY - 1;
              ammoArr.push({ x: (i + k) * TILE_SIZE + 10, y: ammoY * TILE_SIZE + 10, collected: false });
            }
          }
        }

        if (i >= 170) {
          for (let j = 12; j < window.innerHeight / TILE_SIZE; j++) {
            tiles.push({ x: i * TILE_SIZE, y: j * TILE_SIZE, type: j === 12 ? 'top' : 'fill' });
          }
        }
      }

      // guaranteed enemies near start
      const guaranteedXs = [35, 55, 75].map(t => t * TILE_SIZE);
      for (const gx of guaranteedXs) {
        const top = tiles.find(t => t.type === 'top' && Math.abs(t.x - gx) < TILE_SIZE);
        if (top) enemiesArr.push(new Enemy(enemyId++, top.x, top.y - TILE_SIZE - 10));
      }

      // traffic lights
      const trafficLightsArr = [];
      let numLights = 0;
      if (lvl === 1) numLights = Math.floor(Math.random() * 2) + 2;
      else if (lvl === 2) numLights = Math.floor(Math.random() * 2) + 3;
      else if (lvl === 3) numLights = Math.floor(Math.random() * 3) + 4;

      const MIN_LIGHT_SPACING = 15 * TILE_SIZE;
      let lastLightX = -MIN_LIGHT_SPACING;

      const possibleSpawnTiles2 = tiles.filter(t => t.type === 'top' && t.x > 30 * TILE_SIZE && t.x < 150 * TILE_SIZE);

      for (let i = possibleSpawnTiles2.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [possibleSpawnTiles2[i], possibleSpawnTiles2[j]] = [possibleSpawnTiles2[j], possibleSpawnTiles2[i]];
      }

      for (const tile of possibleSpawnTiles2) {
        if (trafficLightsArr.length >= numLights) break;
        if (tile.x > lastLightX + MIN_LIGHT_SPACING) {
          trafficLightsArr.push({
            x: tile.x + (TILE_SIZE / 2),
            y: tile.y - 120,
            w: 40, h: 120,
            state: Math.random() > 0.4 ? 'red' : 'green',
            triggered: false,
            redDialogueShown: false,
            nextToggleAt: Date.now() + (2000 + Math.random() * 2500)
          });
          lastLightX = tile.x;
        }
      }

      return { tiles, enemiesArr, ammoArr, bossX: 185 * TILE_SIZE, trafficLightsArr };
    }

    function initLevel(lvl) {
      const data = generateLevel(lvl);
      levelTiles = data.tiles;
      enemies = data.enemiesArr;
      ammoItems = data.ammoArr;
      trafficLights = data.trafficLightsArr;
      floatingTexts = [];
      player = new Player();
      boss = new Boss(data.bossX);
      bullets = [];
      flower = null;
      cameraX = 0;
      currentLevel = lvl;
      ammo = 0;

      activeTrafficLight = null;

      // cap bg scale based on viewport
      const profile = getViewportProfile();
      const maxScaleCap = (profile === 'mobile') ? 1.35 : (profile === 'tablet' ? 1.8 : MAX_BG_SCALE);

      backgroundObjects = [];
      let lastX = 0;
      const initialGroundY = getGroundTopY();

      for (let i = 0; i < NUM_BG_OBJECTS; i++) {
        const newX = lastX + MIN_BG_SPACING + Math.random() * 800;

        let scale = Math.random() * (maxScaleCap - MIN_BG_SCALE) + MIN_BG_SCALE;
        if (lvl === 2) scale *= BUILDING_BG_SCALE_MULTIPLIER;
        else scale *= VILLAGE_BG_SCALE_MULTIPLIER;

        const w = BASE_BG_WIDTH * scale;
        const h = BASE_BG_HEIGHT * scale;
        const parallax = 0.2 + (scale / MAX_BG_SCALE) * 0.4;

        backgroundObjects.push({ x: newX, y: initialGroundY - h, w, h, parallaxFactor: parallax });
        lastX = newX;
      }
      backgroundObjects.sort((a, b) => a.h - b.h);

      hideEnemyChat();
      playLevelMusic(lvl);
    }

    /** 6. GAME LOOP **/
    function updateTrafficLights() {
      if (!trafficLights) return;

      const now = Date.now();
      for (const light of trafficLights) {
        if (now >= light.nextToggleAt) {
          light.state = (light.state === 'red') ? 'green' : 'red';
          light.nextToggleAt = now + (2200 + Math.random() * 2800);

          if (light.state === 'red') light.redDialogueShown = false;

          if (activeTrafficLight === light && light.state === 'green') {
            activeTrafficLight = null;
          }
        }
      }
    }

    function isPlayerNearTrafficLight(light) {
      const barrierX = light.x;
      const range = 28;
      const playerCenterX = player.x + player.w / 2;
      const nearX = Math.abs(playerCenterX - barrierX) < (range + player.w / 2);
      const nearY = (player.y + player.h) > (light.y + 40);
      return nearX && nearY;
    }

    function handleTrafficLightBlocking() {
      if (!trafficLights || !player) return;

      if (activeTrafficLight && activeTrafficLight.state === 'red') return;

      for (const light of trafficLights) {
        if (light.state !== 'red') continue;
        if (!isPlayerNearTrafficLight(light)) continue;

        activeTrafficLight = light;

        if (!light.redDialogueShown) {
          light.redDialogueShown = true;
          openDialogue(TRAFFIC_LIGHT_DIALOGUE.red, 'TRAFFIC');
        }
        break;
      }
    }

    function updateGameplaySimulation() {
      handleTrafficLightBlocking();
      player.update();

      ammoItems.forEach(item => {
        if (!item.collected && player.x < item.x + 20 && player.x + player.w > item.x && player.y < item.y + 20 && player.y + player.h > item.y) {
          item.collected = true; ammo += 3; score += 50;
        }
      });

      enemies.forEach((en, idx) => {
        en.update();
        if (en.dead) { enemies.splice(idx, 1); return; }
        if (player.x < en.x + en.w && player.x + player.w > en.x && player.y < en.y + en.h && player.y + player.h > en.y) {
          playDieSfx();
          player.reset();
        }
      });

      const CHAT_RANGE = 5 * TILE_SIZE;
      let nearestEnemy = null;
      let nearestDist = Infinity;
      for (const en of enemies) {
        const d = Math.abs((en.x + en.w / 2) - (player.x + player.w / 2));
        if (d < CHAT_RANGE && d < nearestDist) { nearestDist = d; nearestEnemy = en; }
      }
      if (nearestEnemy) showEnemyChat(nearestEnemy);
      else hideEnemyChat();

      bullets.forEach((b, bi) => {
        b.x += 12;
        if (b.x > player.x + 1000) bullets.splice(bi, 1);

        enemies.forEach((en, ei) => {
          if (b.x > en.x && b.x < en.x + en.w && b.y > en.y && b.y < en.y + en.h) {
            bullets.splice(bi, 1); enemies.splice(ei, 1); score += 100; floatingTexts.push(new FloatingText(en.x, en.y));
          }
        });

        if (boss.active && !boss.defeated && b.x > boss.x && b.x < boss.x + boss.w && b.y > boss.y && b.y < boss.y + boss.h) {
          bullets.splice(bi, 1);
          boss.hp -= 40;
          floatingTexts.push(new FloatingText(boss.x + 50, boss.y + 50));
          if (boss.hp <= 0) {
            boss.defeated = true;
            score += 1000;
            flower = {
              x: boss.x + 60,
              y: 12 * TILE_SIZE - 40,
              color: currentLevel === 1 ? 'white' : (currentLevel === 2 ? 'yellow' : 'red')
            };
            stopBossMusicImmediately();
          }
        }
      });

      if (!boss.active && !boss.defeated && player.x > boss.x - 500) triggerBossDialogue();

      if (flower && player.x > flower.x) {
        const nextLevel = currentLevel + 1;
        flower = null;

        if (currentLevel < 3) {
          playUpgradeSfx();
          setTimeout(() => {
            initLevel(nextLevel);
            stopUpgradeSfx();
          }, 250);
        } else {
          finishGame();
        }
      }
    }

    function update() {
      updateTrafficLights();

      // FIX: use CSS pixels, not canvas.width (device pixels)
      let targetCam = player ? (player.x - window.innerWidth / 4) : 0;
      cameraX += (targetCam - cameraX) * 0.1;

      updateRunSfx();

      if (!isDialogueActive) {
        updateGameplaySimulation();
      }
    }

    function drawTrafficLight(x, y, state) {
      ctx.fillStyle = '#424242';
      ctx.fillRect(x - 6, y, 12, 120);

      ctx.fillStyle = '#212121';
      ctx.fillRect(x - 20, y, 40, 95);
      ctx.strokeStyle = '#616161';
      ctx.lineWidth = 2;
      ctx.strokeRect(x - 20, y, 40, 95);

      ctx.save();

      if (state === 'red') {
        ctx.shadowColor = '#f44336';
        ctx.shadowBlur = 25;
        ctx.fillStyle = '#d32f2f';
      } else {
        ctx.fillStyle = '#4e2222';
      }
      ctx.beginPath(); ctx.arc(x, y + 20, 12, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;

      ctx.fillStyle = '#6b5500';
      ctx.beginPath(); ctx.arc(x, y + 47, 12, 0, Math.PI * 2); ctx.fill();

      if (state === 'green') {
        ctx.shadowColor = '#4caf50';
        ctx.shadowBlur = 25;
        ctx.fillStyle = '#388e3c';
      } else {
        ctx.fillStyle = '#1c491e';
      }
      ctx.beginPath(); ctx.arc(x, y + 74, 12, 0, Math.PI * 2); ctx.fill();

      ctx.restore();
    }

    function draw() {
      // FIX: clear/fill in CSS pixels (because ctx is transformed for DPR)
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      const skyColor = (currentLevel === 2) ? '#0b1d4d' : '#81d4fa';
      ctx.fillStyle = skyColor;
      ctx.fillRect(0, 0, vw, vh);

      const bgSprite = (currentLevel === 2) ? buildingImg : houseImg;

      backgroundObjects.forEach(bgObj => {
        const parallaxCameraX = cameraX * bgObj.parallaxFactor;
        if (bgObj.x - parallaxCameraX < vw && bgObj.x - parallaxCameraX + bgObj.w > 0) {
          ctx.drawImage(bgSprite, bgObj.x - parallaxCameraX, bgObj.y, bgObj.w, bgObj.h);
        }
      });

      levelTiles.forEach(t => {
        if (t.x - cameraX > -TILE_SIZE && t.x - cameraX < vw) {
          if (t.type === 'top') ctx.drawImage(topTileCanvas, t.x - cameraX, t.y, TILE_SIZE, TILE_SIZE);
          else ctx.drawImage(fillTileCanvas, t.x - cameraX, t.y, TILE_SIZE, TILE_SIZE);
        }
      });

      if (trafficLights) {
        trafficLights.forEach(light => {
          if (light.x - cameraX > -200 && light.x - cameraX < vw + 200) {
            drawTrafficLight(light.x - cameraX, light.y, light.state);
          }
        });
      }

      ammoItems.forEach(item => {
        if (!item.collected) {
          ctx.fillStyle = '#ff4081';
          ctx.beginPath();
          ctx.arc(item.x - cameraX + 10, item.y + 10, 10, 0, Math.PI * 2);
          ctx.fill();
        }
      });

      enemies.forEach(en => en.draw());
      player.draw();
      boss.draw();

      bullets.forEach(b => {
        ctx.fillStyle = '#ff4081';
        ctx.beginPath();
        ctx.arc(b.x - cameraX, b.y, 6, 0, Math.PI * 2);
        ctx.fill();
      });

      floatingTexts.forEach((ft, i) => {
        ft.draw();
        if (ft.life <= 0) floatingTexts.splice(i, 1);
      });

      if (flower) {
        ctx.fillStyle = flower.color;
        ctx.beginPath();
        ctx.arc(flower.x - cameraX, flower.y, 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'green';
        ctx.fillRect(flower.x - cameraX - 2, flower.y + 15, 4, 15);
      }

      ctx.fillStyle = 'white';
      ctx.strokeStyle = 'black';
      ctx.lineWidth = 4;
      ctx.font = 'bold 24px Courier';
      let txt = `LVL: ${currentLevel}  SCORE: ${score}  EMPATHY: ${ammo}`;
      ctx.strokeText(txt, 20, 40);
      ctx.fillText(txt, 20, 40);
    }

    class Boss {
      constructor(x) {
        this.x = x;
        this.y = 100;

        this.w = 160;
        this.h = 280;

        if (currentLevel === 1) {
          this.w = 280;
        }

        this.hp = 100;
        this.active = false;
        this.defeated = false;
      }

      update() {
        if (!this.active || this.defeated) return;

        const playerEyeY = player ? (player.y + 18) : (window.innerHeight * 0.35);
        const floatAmp = Math.min(90, window.innerHeight * 0.12);
        const desiredY = (playerEyeY - this.h * 0.35) + Math.sin(Date.now() / 400) * floatAmp;

        const groundTop = getGroundTopY();
        const marginAboveGround = 18;
        const maxY = groundTop - this.h - marginAboveGround;

        const minY = 20;

        this.y = Math.max(minY, Math.min(desiredY, maxY));
      }

      draw() {
        if (this.defeated) return;

        const dx = this.x - cameraX;
        const dy = this.y;

        if (currentLevel === 1) ctx.drawImage(birdImg, dx, dy, this.w, this.h);
        else if (currentLevel === 2) ctx.drawImage(bossLvl2Img, dx, dy, this.w, this.h);
        else ctx.drawImage(bossLvl3Img, dx, dy, this.w, this.h);

        ctx.fillStyle = 'black';
        ctx.fillRect(dx, dy - 30, this.w, 15);
        ctx.fillStyle = '#00ff00';
        ctx.fillRect(dx, dy - 30, (this.hp/100) * this.w, 15);
      }
    }

    /* --- GAME STATE FUNCTIONS --- */
    function startGame() {
      unlockAudioOnce();

      document.getElementById('title-screen').classList.add('hidden');
      document.getElementById('end-screen').classList.add('hidden');
      gameState = 'PLAYING';
      updateTitleBackgroundVisibility();

      score = 0;
      startTime = Date.now();

      bossMusicPlayedForLevel = { 1: false, 2: false, 3: false };
      initLevel(1);

      requestAnimationFrame(gameLoop);
      window.focus();
    }

    function gameLoop() {
      if (gameState !== 'PLAYING') return;

      update();
      if (!isDialogueActive) boss.update();

      draw();
      requestAnimationFrame(gameLoop);
    }

    function triggerBossDialogue() {
      const d = BOSS_DIALOGUE[currentLevel] || {
        name: (currentLevel === 1 ? "GIANT BIRD" : "THE GUARDIAN"),
        lines: ["Only those with Empathy can pass this land.", "Prove yourself!"]
      };

      openDialogue(d, 'BOSS');

      if (!bossMusicPlayedForLevel[currentLevel]) {
        bossMusicPlayedForLevel[currentLevel] = true;
        startBossMusic(currentLevel);
      }
    }

    function finishGame() {
      gameState = 'END';
      updateTitleBackgroundVisibility();

      safePause(runSfx);
      stopAllMusic();

      const time = ((Date.now() - startTime) / 1000).toFixed(2);
      window.finalScore = score; window.finalTime = time;
      document.getElementById('end-screen').classList.remove('hidden');
      document.getElementById('end-stats').innerText = `Time: ${time}s | Score: ${score}`;
    }

    function saveScore() {
      const name = document.getElementById('player-name').value || "ANON";
      const lb = JSON.parse(localStorage.getItem('pq_final_lb') || '[]');
      lb.push({ name, score: window.finalScore, time: parseFloat(window.finalTime) });
      lb.sort((a,b) => a.time - b.time);
      localStorage.setItem('pq_final_lb', JSON.stringify(lb.slice(0, 5)));
      showTitle();
    }

    function showLeaderboard() {
      document.getElementById('title-screen').classList.add('hidden');
      document.getElementById('leaderboard-screen').classList.remove('hidden');
      const lb = JSON.parse(localStorage.getItem('pq_final_lb') || '[]');
      document.getElementById('leaderboard-list').innerHTML =
        lb.map((s, i) => `<div>${i+1}. ${s.name} - ${s.time}s</div>`).join('') || "No scores yet";
    }

    function showTitle() {
      gameState = 'TITLE';
      updateTitleBackgroundVisibility();

      safePause(runSfx);

      document.getElementById('title-screen').classList.remove('hidden');
      document.getElementById('leaderboard-screen').classList.add('hidden');
      document.getElementById('end-screen').classList.add('hidden');

      if (audioUnlocked) playIntroMusic();
    }
  </script>
